<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg-main: #ffffff; --bg-sidebar: #f9f9f9; --text-main: #1a1a1a; --border-color: #e5e5e5; --chat-max-width: 800px; }
        [data-theme="dark"] { --bg-main: #212121; --bg-sidebar: #171717; --text-main: #ececec; --border-color: #303030; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; display: flex; height: 100vh; transition: background 0.3s; }
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        .new-chat-btn { border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; background: rgba(16, 163, 127, 0.1); color: #10a37f; border-color: rgba(16, 163, 127, 0.3); font-weight: 500; }
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; }
        #chat-window { flex: 1; width: 100%; max-width: var(--chat-max-width); overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .message-row { padding: 24px 0; display: flex; gap: 20px; border-bottom: 1px solid var(--border-color); }
        .avatar { width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .user-avatar { background: #5436DA; color: white; }
        .ai-avatar { background: #10a37f; color: white; }
        .content { flex: 1; line-height: 1.7; font-size: 16px; overflow-x: auto; }
        .reasoning-box { background: rgba(0,0,0,0.05); border-left: 3px solid #10a37f; padding: 12px; margin: 10px 0; font-size: 14px; color: #888; border-radius: 4px; }
        .input-area { width: 100%; max-width: var(--chat-max-width); padding: 20px; box-sizing: border-box; }
        .input-wrapper { background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 16px; padding: 12px 15px; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; border: none; outline: none; background: transparent; color: var(--text-main); font-size: 16px; resize: none; max-height: 200px; }
        #send-btn { background:#10a37f; color:white; border:none; padding:6px 16px; border-radius:6px; cursor:pointer; font-weight: 500; }
    </style>
</head>
<body data-theme="dark">
<div class="sidebar">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding: 5px 10px;">
        <img src="/favicon.ico" style="width: 30px; height: 30px; border-radius: 6px;" onerror="this.src='https://libretv-4gl.pages.dev/favicon.ico'">
        <div style="display: flex; flex-direction: column;">
            <span style="font-weight: bold; font-size: 18px; line-height: 1;">LibreTV</span>
            <span style="font-size: 10px; opacity: 0.5; margin-top: 4px; letter-spacing: 1px;">AI ASSISTANT</span>
        </div>
    </div>
    <button class="new-chat-btn" onclick="location.reload()">+ 新对话</button>
    <div style="flex:1"></div>
    <div style="padding: 10px; border-top: 1px solid var(--border-color); font-size: 12px;">
        <div style="margin-bottom: 12px; opacity: 0.5;">Model: DeepSeek-R1 (Thinking)</div>
        <div onclick="toggleTheme()" style="cursor: pointer;">🌓 切换明亮/暗黑模式</div>
    </div>
</div>
<div class="main-container">
    <div id="chat-window"><div class="message-row"><div class="avatar ai-avatar">D</div><div class="content">你好！我是已接入 R1 思考模型的 LibreTV 助手，问我任何难题吧。</div></div></div>
    <div class="input-area"><div class="input-wrapper">
        <textarea id="userInput" placeholder="输入消息..." rows="1"></textarea>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <span style="font-size:12px; opacity:0.3">Enter 发送 / Shift+Enter 换行</span>
            <button id="send-btn">发送</button>
        </div>
    </div></div>
</div>
<script>
    const chatWindow = document.getElementById('chat-window'), userInput = document.getElementById('userInput'), sendBtn = document.getElementById('send-btn');
    let messages = [];
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });

    async function sendMessage() {
        const text = userInput.value.trim(); if (!text) return;
        userInput.value = ''; userInput.style.height = 'auto';
        appendRow('user', text); messages.push({ role: "user", content: text });

        const aiContentDiv = appendRow('assistant', '...');
        let fullText = "", reasoningText = "", reasoningDiv = null;

        try {
            const response = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: messages }) });
            const reader = response.body.getReader(), decoder = new TextDecoder();
            aiContentDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read(); if (done) break;
                const chunk = decoder.decode(value).split('\n');
                for (const line of chunk) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.substring(6)), delta = data.choices[0].delta;
                            if (delta.reasoning_content) {
                                if (!reasoningDiv) {
                                    reasoningDiv = document.createElement('div'); reasoningDiv.className = 'reasoning-box';
                                    reasoningDiv.innerHTML = `<div style="color:#10a37f; font-weight:bold; font-size:12px; margin-bottom:5px;">🤔 思考中...</div><div class="r-text"></div>`;
                                    aiContentDiv.parentNode.insertBefore(reasoningDiv, aiContentDiv);
                                }
                                reasoningText += delta.reasoning_content;
                                reasoningDiv.querySelector('.r-text').innerText = reasoningText;
                            }
                            if (delta.content) {
                                if (reasoningDiv) { reasoningDiv.querySelector('div:first-child').innerText = "✅ 思考完成"; reasoningDiv.style.opacity = "0.5"; }
                                fullText += delta.content;
                                aiContentDiv.innerHTML = marked.parse(fullText);
                                aiContentDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            }
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText });
        } catch (e) { aiContentDiv.innerText = "错误: " + e.message; }
    }
    function appendRow(role, text) {
        const row = document.createElement('div'); row.className = 'message-row';
        row.innerHTML = `<div class="avatar ${role === 'user' ? 'user-avatar' : 'ai-avatar'}">${role === 'user' ? 'U' : 'D'}</div><div class="content">${role === 'user' ? text : marked.parse(text)}</div>`;
        chatWindow.appendChild(row); chatWindow.scrollTop = chatWindow.scrollHeight;
        return row.querySelector('.content');
    }
    sendBtn.onclick = sendMessage;
    userInput.onkeydown = e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
</script>
</body>
</html>
