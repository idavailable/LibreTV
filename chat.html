<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV AI - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg-main: #ffffff; --bg-sidebar: #f9f9f9; --text-main: #1a1a1a; --border-color: #e5e5e5; --accent: #10a37f; --max-w: 1200px; }
        [data-theme="dark"] { --bg-main: #212121; --bg-sidebar: #171717; --text-main: #ececec; --border-color: #383838; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 侧边栏 */
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; }
        .new-chat-btn { border: 1px solid var(--accent); padding: 10px; border-radius: 8px; cursor: pointer; background: rgba(16, 163, 127, 0.1); color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 20px; }
        #history-container { flex: 1; overflow-y: auto; font-size: 13px; }
        .history-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; border: 1px solid transparent; transition: 0.2s; }
        .history-item:hover { background: rgba(16, 163, 127, 0.08); }
        .history-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
        .history-time { font-size: 11px; opacity: 0.5; }

        /* 主容器 - 关键修复：防止内容溢出或压缩 */
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0; scroll-behavior: smooth; }
        .chat-content-area { width: 100%; max-width: var(--max-w); padding: 0 40px; box-sizing: border-box; }
        
        /* 消息行修复：确保 flex-start 对齐，内容 flex: 1 */
        .message-row { padding: 30px 0; border-bottom: 1px solid var(--border-color); display: flex; align-items: flex-start; gap: 24px; width: 100%; box-sizing: border-box; }
        .avatar { width: 36px; height: 36px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; margin-top: 2px; }
        .ai-avatar { background: var(--accent); }
        .user-avatar { background: #5436DA; }
        
        /* 内容区域修复：min-width: 0 是解决竖向显示的核心 */
        .content { flex: 1; min-width: 0; line-height: 1.7; font-size: 16px; word-wrap: break-word; }
        .content p { margin: 0 0 1em 0; }
        .content pre { background: #1a1b26; padding: 18px; border-radius: 10px; overflow-x: auto; width: 100%; border: 1px solid rgba(255,255,255,0.1); margin: 15px 0; }
        .content img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border-color); }

        .reasoning-box { background: rgba(128,128,128,0.06); border-left: 4px solid var(--accent); padding: 16px 20px; margin-bottom: 20px; border-radius: 6px; color: #888; font-size: 14.5px; }
        .reasoning-title { color: var(--accent); font-weight: bold; font-size: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

        /* 输入区 */
        .input-area { width: 100%; display: flex; justify-content: center; padding: 20px 0 40px; background: linear-gradient(transparent, var(--bg-main) 20%); }
        .input-wrapper { width: 90%; max-width: var(--max-w); background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 16px; padding: 12px 18px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        textarea { width: 100%; border: none; outline: none; background: transparent; color: var(--text-main); font-size: 16px; resize: none; max-height: 200px; padding: 5px 0; line-height: 1.5; }
        
        .toolbar { display: flex; align-items: center; margin-top: 12px; gap: 15px; }
        .tool-btn { cursor: pointer; opacity: 0.6; display: flex; align-items: center; transition: 0.2s; }
        .tool-btn:hover { opacity: 1; color: var(--accent); }
        
        #action-btn { margin-left: auto; background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        #action-btn.stop { background: #ef4444; }
        #action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #file-preview { display: none; padding: 8px 12px; background: rgba(16, 163, 127, 0.1); border-radius: 8px; font-size: 12px; color: var(--accent); margin-bottom: 10px; border: 1px dashed var(--accent); }
    </style>
</head>
<body data-theme="dark">

<div class="sidebar">
    <div class="new-chat-btn" onclick="startNewChat()">+ 开启新对话</div>
    <div id="history-container"></div>
    <div style="margin-top:auto; padding-top:15px; border-top:1px solid var(--border-color); font-size:12px; opacity:0.6; cursor:pointer" onclick="toggleTheme()">🌓 切换外观模式</div>
</div>

<div class="main-container">
    <div id="chat-window">
        <div class="chat-content-area" id="msg-container">
            <div class="message-row">
                <div class="avatar ai-avatar">R</div>
                <div class="content">您好！我是接入了 DeepSeek-R1 的助手。已修复宽屏布局，支持附件上传与停止生成。</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <div id="file-preview">📎 已关联文件: <span id="file-name"></span> <span style="cursor:pointer;margin-left:10px" onclick="clearFile()">✕</span></div>
            <textarea id="userInput" placeholder="输入您的问题，或点击左侧上传附件..." rows="1"></textarea>
            <div class="toolbar">
                <label class="tool-btn" title="上传附件 (支持文本/代码/图片)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    <input type="file" id="fileInput" hidden onchange="handleFileSelect(this)">
                </label>
                
                <div style="font-size:12px; opacity:0.3">Enter 发送 / Shift+Enter 换行</div>

                <button id="action-btn" onclick="handleAction()">
                    <span id="btn-icon"></span><span id="btn-text">发送</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let messages = [];
    let controller = null;
    let selectedFile = null;
    let currentChatId = "chat_" + Date.now();

    const msgContainer = document.getElementById('msg-container');
    const userInput = document.getElementById('userInput');
    const actionBtn = document.getElementById('action-btn');
    const btnText = document.getElementById('btn-text');
    const filePreview = document.getElementById('file-preview');
    const fileNameDisplay = document.getElementById('file-name');

    document.addEventListener('DOMContentLoaded', loadHistoryList);

    function toggleTheme() {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    }

    function handleFileSelect(input) {
        if (input.files && input.files[0]) {
            selectedFile = input.files[0];
            fileNameDisplay.innerText = selectedFile.name;
            filePreview.style.display = 'block';
        }
    }

    function clearFile() {
        selectedFile = null;
        filePreview.style.display = 'none';
        document.getElementById('fileInput').value = '';
    }

    function handleAction() {
        if (btnText.innerText === '发送') sendMessage();
        else stopGeneration();
    }

    function stopGeneration() {
        if (controller) {
            controller.abort();
            setBtnState('发送');
        }
    }

    function setBtnState(state) {
        if (state === '停止') {
            actionBtn.classList.add('stop');
            btnText.innerText = '停止';
        } else {
            actionBtn.classList.remove('stop');
            btnText.innerText = '发送';
        }
    }

    async function uploadToR2(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('chatId', currentChatId);
        const res = await fetch('/upload', { method: 'POST', body: formData });
        return await res.json();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text && !selectedFile) return;

        let displayContent = text;
        let aiPromptContent = text;

        actionBtn.disabled = true;
        
        // 处理文件上传并提取内容
        if (selectedFile) {
            try {
                const fileData = await uploadToR2(selectedFile);
                if (fileData.isText) {
                    aiPromptContent = `【参考附件：${fileData.name}】\n内容原文：\n${fileData.content}\n\n指令：${text}`;
                    displayContent += `\n\n📄 _已读取附件内容：${fileData.name}_`;
                } else if (fileData.type.startsWith('image/')) {
                    displayContent += `\n\n![图片](${fileData.url})`;
                }
                clearFile();
            } catch (e) {
                console.error("上传失败", e);
            }
        }

        userInput.value = '';
        userInput.style.height = 'auto';
        setBtnState('停止');
        actionBtn.disabled = false;

        appendRow('user', displayContent);
        messages.push({ role: "user", content: aiPromptContent });

        controller = new AbortController();
        const aiRow = document.createElement('div');
        aiRow.className = 'message-row';
        aiRow.innerHTML = `<div class="avatar ai-avatar">R</div><div class="content" id="active-content">...</div>`;
        msgContainer.appendChild(aiRow);
        
        const aiDiv = aiRow.querySelector('#active-content');
        let fullText = "", reasoningText = "", reasoningDiv = null;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, chatId: currentChatId }),
                signal: controller.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.substring(6));
                            const delta = data.choices[0].delta;

                            if (delta.reasoning_content) {
                                if (!reasoningDiv) {
                                    reasoningDiv = document.createElement('div');
                                    reasoningDiv.className = 'reasoning-box';
                                    reasoningDiv.innerHTML = `<div class="reasoning-title">🤔 深度推理中...</div><div class="r-text"></div>`;
                                    aiDiv.parentNode.insertBefore(reasoningDiv, aiDiv);
                                }
                                reasoningText += delta.reasoning_content;
                                reasoningDiv.querySelector('.r-text').innerText = reasoningText;
                            }

                            if (delta.content) {
                                if (reasoningDiv) reasoningDiv.querySelector('.reasoning-title').innerText = '✅ 思考完成';
                                fullText += delta.content;
                                aiDiv.innerHTML = marked.parse(fullText);
                                aiDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            }
                            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText, reasoning_content: reasoningText });
            loadHistoryList();
        } catch (e) {
            if (e.name === 'AbortError') aiDiv.innerHTML += " [已停止生成]";
            else aiDiv.innerText = "Error: " + e.message;
        } finally {
            setBtnState('发送');
            controller = null;
        }
    }

    function appendRow(role, text) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `<div class="avatar ${role==='user'?'user-avatar':'ai-avatar'}">${role==='user'?'U':'R'}</div><div class="content">${marked.parse(text)}</div>`;
        msgContainer.appendChild(row);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    async function loadHistoryList() {
        try {
            const res = await fetch('/history');
            if (res.ok) {
                const list = await res.json();
                document.getElementById('history-container').innerHTML = list.map(item => `
                    <div class="history-item" onclick="loadChat('${item.chatId}')">
                        <div class="history-title">💬 ${item.title}</div>
                        <div class="history-time">${new Date(item.uploaded).toLocaleString().slice(5, 16)}</div>
                    </div>
                `).join('');
            }
        } catch (e) {}
    }

    async function loadChat(chatId) {
        currentChatId = chatId;
        msgContainer.innerHTML = '<div style="padding:40px; text-align:center; opacity:0.4">正在加载历史记录...</div>';
        try {
            const res = await fetch('/history', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ chatId }) });
            const data = await res.json();
            messages = data.messages;
            msgContainer.innerHTML = '';
            messages.forEach(msg => {
                if (msg.role === 'assistant' && msg.reasoning_content) appendReasoningBox(msg.reasoning_content, true);
                appendRow(msg.role, msg.content);
            });
        } catch (e) { msgContainer.innerHTML = "加载失败"; }
    }

    function appendReasoningBox(text, isHistory) {
        const box = document.createElement('div');
        box.className = 'reasoning-box';
        box.style.opacity = isHistory ? "0.6" : "1";
        box.innerHTML = `<div class="reasoning-title">${isHistory ? '📜 历史推理' : '🤔 思考过程'}</div><div class="r-text">${text}</div>`;
        msgContainer.appendChild(box);
    }

    function startNewChat() { location.reload(); }

    userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
    userInput.onkeydown = e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
</script>
</body>
</html>
