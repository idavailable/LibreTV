<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        /* 基础设置：强制不使用任何 flex 居中 */
        :root { --bg: #212121; --side: #171717; --text: #ececec; --border: #383838; --accent: #10a37f; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }

        /* 侧边栏：使用固定定位 */
        .sidebar { width: 260px; position: fixed; left: 0; top: 0; bottom: 0; background: var(--side); border-right: 1px solid var(--border); padding: 20px; z-index: 100; overflow-y: auto; }
        .logo { font-size: 22px; font-weight: bold; color: var(--accent); margin-bottom: 20px; }
        .new-chat-btn { display: block; width: 100%; border: 1px solid var(--accent); padding: 12px; border-radius: 8px; cursor: pointer; background: rgba(16, 163, 127, 0.1); color: var(--accent); text-align: center; margin-bottom: 20px; text-decoration: none; }
        .history-item { display: block; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #aaa; margin-bottom: 5px; border: 1px solid transparent; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-item:hover { background: #2a2a2a; color: #fff; }

        /* 主界面：使用 margin 给侧边栏留位置 */
        .main-container { margin-left: 260px; min-height: 100vh; position: relative; width: calc(100% - 260px); }
        
        /* 聊天窗口：彻底的块级流 */
        #chat-window { width: 100%; padding-bottom: 150px; display: block; }
        .message-row { width: 100%; border-bottom: 1px solid var(--border); padding: 30px 20px; display: block; clear: both; }
        .message-inner { max-width: 800px; margin: 0 auto; display: block; }
        
        /* 头像与内容：使用浮动或简单块级，防止挤压 */
        .avatar { width: 34px; height: 34px; border-radius: 6px; float: left; margin-right: 20px; text-align: center; line-height: 34px; font-weight: bold; color: white; }
        .ai-avatar { background: var(--accent); }
        .user-avatar { background: #5436DA; }

        /* 核心修复：这个 div 必须占据剩余宽度且不换行 */
        .content { overflow: hidden; display: block; font-size: 16px; line-height: 1.7; color: var(--text); width: auto; }
        .content p { margin: 0 0 1em 0; display: block; width: 100%; }
        .content pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; display: block; width: 100%; margin: 15px 0; border: 1px solid var(--border); }
        
        .reasoning-box { background: rgba(255,255,255,0.05); border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 15px; border-radius: 6px; color: #999; font-size: 14px; display: block; clear: both; }

        /* 输入区固定在底部 */
        .input-area { position: fixed; bottom: 0; right: 0; left: 260px; padding: 20px 0 40px; background: linear-gradient(transparent, var(--bg) 50%); }
        .input-wrapper { max-width: 800px; margin: 0 auto; background: #2f2f2f; border: 1px solid var(--border); border-radius: 14px; padding: 12px; position: relative; }
        textarea { width: 100%; border: none; outline: none; background: transparent; color: white; font-size: 16px; resize: none; min-height: 24px; max-height: 200px; padding-bottom: 30px; }
        
        .toolbar { position: absolute; bottom: 10px; right: 15px; }
        #action-btn { background: var(--accent); color: white; border: none; padding: 6px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #action-btn.stop { background: #ef4444; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">LibreTV AI</div>
    <div class="new-chat-btn" onclick="startNewChat()">+ 开启新对话</div>
    <div id="history-container"></div>
</div>

<div class="main-container">
    <div id="chat-window">
        <div id="msg-container">
            <div class="message-row">
                <div class="message-inner">
                    <div class="avatar ai-avatar">R</div>
                    <div class="content">布局模式已切换为“传统隔离块”。如果文字还是竖着的，请务必检查浏览器是否有极简模式或强制缩放。</div>
                </div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="输入消息..." rows="1"></textarea>
            <div class="toolbar">
                <button id="action-btn" onclick="handleAction()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 初始化变量
    let currentChatId = "chat_" + Date.now();
    let messages = [];
    let controller = null;

    // 2. 页面加载历史
    window.onload = loadHistory;

    function handleAction() {
        const btn = document.getElementById('action-btn');
        if (btn.innerText === '发送') sendMessage();
        else if (controller) controller.abort();
    }

    // 3. 核心加载历史函数（修复点击没反应的问题）
    async function loadHistory() {
        try {
            const res = await fetch('/history');
            const list = await res.json();
            const container = document.getElementById('history-container');
            container.innerHTML = list.map(item => `
                <div class="history-item" onclick="loadChat('${item.chatId}')">💬 ${item.title || '历史对话'}</div>
            `).join('');
        } catch (e) { console.error("加载历史失败", e); }
    }

    // 4. 加载具体对话（补全了之前可能缺失的逻辑）
    async function loadChat(chatId) {
        currentChatId = chatId;
        const msgContainer = document.getElementById('msg-container');
        msgContainer.innerHTML = '<div style="padding:20px; opacity:0.5">正在加载...</div>';
        
        try {
            const res = await fetch('/history', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ chatId }) 
            });
            const data = await res.json();
            messages = data.messages;
            msgContainer.innerHTML = '';
            
            messages.forEach(msg => {
                if (msg.role === 'assistant' && msg.reasoning_content) {
                    appendReasoning(msg.reasoning_content);
                }
                appendRow(msg.role, msg.content);
            });
        } catch (e) { 
            msgContainer.innerHTML = '<div style="color:red">历史内容读取失败</div>';
        }
    }

    function appendReasoning(text) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `<div class="message-inner"><div class="reasoning-box"><b>🤔 推理过程：</b><br>${text}</div></div>`;
        document.getElementById('msg-container').appendChild(row);
    }

    // 5. 发送消息逻辑
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';
        const btn = document.getElementById('action-btn');
        btn.innerText = '停止';
        btn.classList.add('stop');

        appendRow('user', text);
        messages.push({ role: "user", content: text });

        controller = new AbortController();
        const aiRow = createAiRow();
        const aiDiv = aiRow.querySelector('.active-text');
        let fullText = "", reasoningText = "", reasoningDiv = null;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, chatId: currentChatId }),
                signal: controller.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.substring(6));
                            const delta = data.choices[0].delta;

                            if (delta.reasoning_content) {
                                if (!reasoningDiv) {
                                    reasoningDiv = document.createElement('div');
                                    reasoningDiv.className = 'reasoning-box';
                                    reasoningDiv.innerHTML = `<b>🤔 思考中...</b><div class="r-text"></div>`;
                                    aiDiv.parentNode.insertBefore(reasoningDiv, aiDiv);
                                }
                                reasoningText += delta.reasoning_content;
                                reasoningDiv.querySelector('.r-text').innerText = reasoningText;
                            }

                            if (delta.content) {
                                fullText += delta.content;
                                aiDiv.innerHTML = marked.parse(fullText);
                                aiDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            }
                            window.scrollTo(0, document.body.scrollHeight);
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText, reasoning_content: reasoningText });
            loadHistory();
        } catch (e) {
            if (e.name === 'AbortError') aiDiv.innerHTML += " [已停止]";
            else aiDiv.innerText = "错误: " + e.message;
        } finally {
            btn.innerText = '发送';
            btn.classList.remove('stop');
            controller = null;
        }
    }

    function createAiRow() {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `<div class="message-inner"><div class="avatar ai-avatar">R</div><div class="content active-text">...</div></div>`;
        document.getElementById('msg-container').appendChild(row);
        return row;
    }

    function appendRow(role, text) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `<div class="message-inner"><div class="avatar ${role==='user'?'user-avatar':'ai-avatar'}">${role==='user'?'U':'R'}</div><div class="content">${marked.parse(text)}</div></div>`;
        document.getElementById('msg-container').appendChild(row);
        window.scrollTo(0, document.body.scrollHeight);
    }

    function startNewChat() { location.reload(); }

    document.getElementById('userInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });
</script>
</body>
</html>
