<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV AI - 修复版</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #212121; --side: #171717; --text: #ececec; --border: #383838; --accent: #10a37f; }
        
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 侧边栏保持固定 */
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; }
        .new-chat-btn { border: 1px solid var(--accent); padding: 10px; border-radius: 8px; cursor: pointer; background: rgba(16, 163, 127, 0.1); color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 20px; }
        #history-list { flex: 1; overflow-y: auto; font-size: 13px; }

        /* 主容器：强制占据剩余空间且不允许收缩 */
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        
        /* 聊天窗口：改为块级滚动，不再居中对齐 */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 0; width: 100%; }
        
        /* 消息展示区：限制最大宽度并水平居中，内部内容左右撑满 */
        .message-box { max-width: 900px; margin: 0 auto; width: 95%; }

        /* 消息行：强制横向排列，align-items 设为 flex-start 防止被拉伸 */
        .message-row { 
            display: flex; 
            width: 100%; 
            padding: 25px 0; 
            border-bottom: 1px solid var(--border); 
            gap: 20px; 
            align-items: flex-start; /* 重点：防止内容被拉伸成奇怪高度 */
        }

        .avatar { width: 34px; height: 34px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; margin-top: 2px; }
        .ai-avatar { background: var(--accent); }
        .user-avatar { background: #5436DA; }
        
        /* 内容区：关键修复！ */
        .content { 
            flex: 1;           /* 占据剩余所有横向空间 */
            min-width: 0;      /* 允许在 flex 容器内缩小，防止撑爆 */
            line-height: 1.7; 
            font-size: 16px; 
            word-wrap: break-word; /* 强制长单词换行 */
            overflow-wrap: break-word;
            white-space: normal;  /* 确保文本正常换行 */
        }

        .content p { margin: 0 0 1em 0; width: 100%; display: block; }
        .content pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; width: 100%; margin: 10px 0; border: 1px solid var(--border); }
        
        .reasoning-box { background: rgba(255,255,255,0.04); border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 15px; border-radius: 6px; color: #aaa; width: 100%; }

        /* 输入区域 */
        .input-outer { width: 100%; padding: 20px 0 40px; background: linear-gradient(transparent, var(--bg) 20%); }
        .input-inner { max-width: 900px; margin: 0 auto; width: 95%; background: #2f2f2f; border: 1px solid var(--border); border-radius: 12px; padding: 12px 18px; position: relative; }
        textarea { width: 100%; border: none; outline: none; background: transparent; color: white; font-size: 16px; resize: none; max-height: 200px; line-height: 1.5; padding-bottom: 30px; }
        
        .toolbar { display: flex; align-items: center; position: absolute; bottom: 12px; right: 18px; gap: 15px; }
        #action-btn { background: var(--accent); color: white; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        #action-btn.stop { background: #ef4444; }
        
        .file-icon { cursor: pointer; opacity: 0.7; font-size: 18px; }
        #file-info { display: none; font-size: 11px; color: var(--accent); margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="new-chat-btn" onclick="location.reload()">+ 开启新对话</div>
    <div id="history-list"></div>
</div>

<div class="main-container">
    <div id="chat-window">
        <div class="message-box" id="msg-container">
            <div class="message-row">
                <div class="avatar ai-avatar">R</div>
                <div class="content">布局已重置为块级加载。请尝试输入，文字现在应当正常横向换行。</div>
            </div>
        </div>
    </div>

    <div class="input-outer">
        <div class="input-inner">
            <div id="file-info"></div>
            <textarea id="userInput" placeholder="输入您的问题..." rows="1"></textarea>
            <div class="toolbar">
                <label class="file-icon" title="上传附件">
                    📎 <input type="file" id="fileInput" hidden onchange="showFileName(this)">
                </label>
                <button id="action-btn" onclick="handleAction()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 变量声明移到最上方，防止 "not defined" 错误
    let currentChatId = "chat_" + Date.now();
    let messages = [];
    let controller = null;

    const msgContainer = document.getElementById('msg-container');
    const userInput = document.getElementById('userInput');
    const actionBtn = document.getElementById('action-btn');

    function showFileName(input) {
        const info = document.getElementById('file-info');
        if(input.files[0]) {
            info.innerText = "已选择附件: " + input.files[0].name;
            info.style.display = "block";
        }
    }

    function handleAction() {
        if (actionBtn.innerText === '发送') sendMessage();
        else if (controller) controller.abort();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = '';
        userInput.style.height = 'auto';
        actionBtn.innerText = '停止';
        actionBtn.classList.add('stop');

        // 用户消息
        appendRow('user', text);
        messages.push({ role: "user", content: text });

        controller = new AbortController();
        
        // 创建 AI 回答占位行
        const aiRow = document.createElement('div');
        aiRow.className = 'message-row';
        aiRow.innerHTML = `<div class="avatar ai-avatar">R</div><div class="content" id="active-content">...</div>`;
        msgContainer.appendChild(aiRow);
        
        const aiDiv = aiRow.querySelector('#active-content');
        let fullText = "", reasoningText = "", reasoningDiv = null;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, chatId: currentChatId }),
                signal: controller.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.substring(6));
                            const delta = data.choices[0].delta;

                            if (delta.reasoning_content) {
                                if (!reasoningDiv) {
                                    reasoningDiv = document.createElement('div');
                                    reasoningDiv.className = 'reasoning-box';
                                    reasoningDiv.innerHTML = `<div style="font-weight:bold;margin-bottom:5px;font-size:12px">🤔 思考中...</div><div class="r-text"></div>`;
                                    aiDiv.parentNode.insertBefore(reasoningDiv, aiDiv);
                                }
                                reasoningText += delta.reasoning_content;
                                reasoningDiv.querySelector('.r-text').innerText = reasoningText;
                            }

                            if (delta.content) {
                                fullText += delta.content;
                                aiDiv.innerHTML = marked.parse(fullText);
                                aiDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            }
                            // 自动滚动
                            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText, reasoning_content: reasoningText });
        } catch (e) {
            if (e.name === 'AbortError') aiDiv.innerHTML += " [已停止]";
            else aiDiv.innerText = "Error: " + e.message;
        } finally {
            actionBtn.innerText = '发送';
            actionBtn.classList.remove('stop');
            controller = null;
        }
    }

    function appendRow(role, text) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `<div class="avatar ${role==='user'?'user-avatar':'ai-avatar'}">${role==='user'?'U':'R'}</div><div class="content">${marked.parse(text)}</div>`;
        msgContainer.appendChild(row);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    userInput.onkeydown = e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
</script>
</body>
</html>
