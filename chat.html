<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV AI - Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg-main: #ffffff; --bg-sidebar: #f9f9f9; --text-main: #1a1a1a; --border-color: #e5e5e5; --chat-max-width: 850px; }
        [data-theme="dark"] { --bg-main: #212121; --bg-sidebar: #171717; --text-main: #ececec; --border-color: #303030; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; }
        .new-chat-btn { border: 1px solid #10a37f; padding: 10px; border-radius: 8px; cursor: pointer; background: rgba(16, 163, 127, 0.1); color: #10a37f; font-weight: bold; text-align: center; }
        .main-container { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        #chat-window { flex: 1; width: 100%; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; align-items: center; }
        .chat-content-area { width: 90%; max-width: var(--chat-max-width); }
        .message-row { padding: 25px 0; border-bottom: 1px solid var(--border-color); display: flex; gap: 20px; width: 100%; }
        .avatar { width: 32px; height: 32px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .ai-avatar { background: #10a37f; }
        .user-avatar { background: #5436DA; }
        .reasoning-box { background: rgba(16, 163, 127, 0.05); border-left: 3px solid #10a37f; padding: 12px 15px; margin: 10px 0; border-radius: 4px; font-size: 14px; color: #888; line-height: 1.6; }
        .reasoning-title { color: #10a37f; font-weight: bold; font-size: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .content { line-height: 1.8; font-size: 16px; word-wrap: break-word; width: 100%; }
        .content pre { background: #1a1b26; padding: 15px; border-radius: 8px; overflow-x: auto; color: #fff; }
        .input-area { width: 100%; display: flex; justify-content: center; padding: 20px 0 40px 0; background: linear-gradient(transparent, var(--bg-main) 20%); }
        .input-wrapper { width: 90%; max-width: var(--chat-max-width); background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 16px; padding: 12px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        textarea { width: 100%; border: none; outline: none; background: transparent; color: var(--text-main); font-size: 16px; resize: none; max-height: 200px; }
        #send-btn { background: #10a37f; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body data-theme="dark">

<div class="sidebar">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 25px;">
        <img src="/favicon.ico" style="width: 32px; height: 32px;" onerror="this.src='https://libretv-4gl.pages.dev/favicon.ico'">
        <span style="font-weight: bold; font-size: 20px;">LibreTV AI</span>
    </div>
    <button class="new-chat-btn" onclick="location.reload()">+ 开启新对话</button>
    <div style="flex:1"></div>
    <div style="font-size: 12px; opacity: 0.5; border-top: 1px solid var(--border-color); padding-top: 15px;">
        <p>Model: DeepSeek-R1</p>
        <p style="cursor:pointer" onclick="toggleTheme()">🌓 切换外观模式</p>
    </div>
</div>

<div class="main-container">
    <div id="chat-window">
        <div class="chat-content-area" id="msg-container">
            <div class="message-row">
                <div class="avatar ai-avatar">R</div>
                <div class="content">你好！我是 LibreTV 的 R1 思考模型。我会先展示我的思考过程，然后再给出正式回答。</div>
            </div>
        </div>
    </div>
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="输入深度思考的问题..." rows="1"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                <span style="font-size:12px; opacity:0.4">Enter 发送 / Shift+Enter 换行</span>
                <button id="send-btn">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 页面初始化变量
    let currentChatId = "chat_" + Date.now();
    let messages = [];
    const msgContainer = document.getElementById('msg-container');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('send-btn');
    const chatWindow = document.getElementById('chat-window');

    // 切换主题逻辑
    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        body.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
    }

    // 输入框自动高度
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    // 发送消息核心逻辑
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        
        userInput.value = '';
        userInput.style.height = 'auto';
        
        appendRow('user', text);
        messages.push({ role: "user", content: text });

        // 创建 AI 消息占位行
        const aiRow = document.createElement('div');
        aiRow.className = 'message-row';
        aiRow.innerHTML = `<div class="avatar ai-avatar">R</div><div class="content" id="current-streaming-content">...</div>`;
        msgContainer.appendChild(aiRow);
        
        const aiContentDiv = aiRow.querySelector('#current-streaming-content');
        let fullText = "", reasoningText = "", reasoningDiv = null;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    messages: messages,
                    chatId: currentChatId 
                })
            });

            if (!response.ok) throw new Error('网络请求失败');

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiContentDiv.innerHTML = ""; // 清除加载提示

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.substring(6));
                            const delta = data.choices[0].delta;

                            // 渲染思考过程
                            if (delta.reasoning_content) {
                                if (!reasoningDiv) {
                                    reasoningDiv = document.createElement('div');
                                    reasoningDiv.className = 'reasoning-box';
                                    reasoningDiv.innerHTML = `<div class="reasoning-title"><span>🤔</span> 思考中...</div><div class="r-text"></div>`;
                                    aiContentDiv.parentNode.insertBefore(reasoningDiv, aiContentDiv);
                                }
                                reasoningText += delta.reasoning_content;
                                reasoningDiv.querySelector('.r-text').innerText = reasoningText;
                            }

                            // 渲染正式回答
                            if (delta.content) {
                                if (reasoningDiv) {
                                    reasoningDiv.querySelector('.reasoning-title').innerHTML = '<span>✅</span> 思考完成';
                                    reasoningDiv.style.opacity = "0.5";
                                }
                                fullText += delta.content;
                                aiContentDiv.innerHTML = marked.parse(fullText);
                                // 代码高亮
                                aiContentDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            }
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText });
            aiContentDiv.id = ""; // 移除 ID 避免干扰后续对话
        } catch (e) {
            aiContentDiv.innerText = "错误: " + e.message;
        }
    }

    // 通用行添加函数
    function appendRow(role, text) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `
            <div class="avatar ${role === 'user' ? 'user-avatar' : 'ai-avatar'}">${role === 'user' ? 'U' : 'R'}</div>
            <div class="content">${marked.parse(text)}</div>
        `;
        msgContainer.appendChild(row);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // 事件绑定
    sendBtn.onclick = sendMessage;
    userInput.onkeydown = e => { 
        if(e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            sendMessage(); 
        } 
    };
</script>
</body>
</html>
