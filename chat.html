<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hl-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" id="hl-dark" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #ffffff; --side: #f7f7f8; --text: #1a1a1a; --border: #e5e7eb; --accent: #10a37f;
            --msg-user: #f3f4f6; --input-bg: #ffffff; --history-hover: #ececf1;
        }
        [data-theme="dark"] {
            --bg: #212121; --side: #171717; --text: #ececec; --border: #383838; --accent: #10a37f;
            --msg-user: #2f2f2f; --input-bg: #2f2f2f; --history-hover: #2a2a2a;
        }

        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- 侧边栏 --- */
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; }
        .side-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 18px; font-weight: 800; color: var(--accent); }
        .theme-btn { cursor: pointer; font-size: 18px; opacity: 0.7; }
        
        .new-btn { border: 1px solid var(--border); padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; margin-bottom: 20px; background: var(--bg); font-weight: 600; color: var(--text); transition: 0.2s; }
        .new-btn:hover { background: var(--history-hover); }
        
        #history-list { flex: 1; overflow-y: auto; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 5px; 
            color: var(--text); position: relative; transition: 0.2s;
        }
        .history-item:hover { background: var(--history-hover); }
        .history-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .del-icon { opacity: 0; color: #ff4d4f; font-size: 14px; padding: 2px 6px; transition: 0.2s; cursor: pointer; }
        .history-item:hover .del-icon { opacity: 1; }

        /* --- 主内容区 --- */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; background: var(--bg); }
        #scroller { flex: 1; overflow-y: auto; width: 100%; display: block; }
        .msg-list { max-width: 850px; margin: 0 auto; width: 92%; padding-bottom: 160px; }

        .msg-row { width: 100%; padding: 25px 0; border-bottom: 1px solid var(--border); display: block; clear: both; overflow: hidden; }
        .avatar { width: 34px; height: 34px; border-radius: 4px; float: left; margin-right: 18px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; }
        .ai-avatar { background: var(--accent); }
        .user-avatar { background: #5436DA; }

        .content { 
            display: block; overflow: hidden; 
            min-width: 200px; line-height: 1.7; font-size: 16px; word-wrap: break-word; 
        }
        .content p { margin: 0 0 1em 0; width: 100%; }
        .content pre { background: #000; color: #fff; padding: 15px; border-radius: 8px; overflow-x: auto; width: 100%; margin: 15px 0; border: 1px solid var(--border); }
        
        .reasoning { background: rgba(0,0,0,0.04); border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 15px; border-radius: 4px; color: #666; font-size: 14px; width: 100%; }
        [data-theme="dark"] .reasoning { background: rgba(255,255,255,0.05); color: #aaa; }

        /* --- 输入区 --- */
        .input-zone { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 0; background: linear-gradient(transparent, var(--bg) 60%); }
        .input-bar { max-width: 850px; margin: 0 auto; width: 92%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; padding: 12px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; border: none; outline: none; background: transparent; color: var(--text); font-size: 16px; resize: none; max-height: 200px; padding-bottom: 35px; }
        
        .tools { position: absolute; bottom: 12px; right: 15px; display: flex; align-items: center; gap: 15px; }
        .up-btn { cursor: pointer; font-size: 20px; opacity: 0.6; }
        #send-btn { background: var(--accent); color: #fff; border: none; padding: 6px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #file-tag { display: none; font-size: 12px; color: var(--accent); margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-head">
        <div class="logo">LibreTV AI</div>
        <div class="theme-btn" onclick="toggleTheme()">🌓</div>
    </div>
    <div class="new-btn" onclick="startNew()">+ 开启新对话</div>
    <div id="history-list"></div>
</div>

<div class="main">
    <div id="scroller">
        <div class="msg-list" id="msg-box">
            <div class="msg-row">
                <div class="avatar ai-avatar">R</div>
                <div class="content">系统已就绪。所有历史记录现已支持完整载入。</div>
            </div>
        </div>
    </div>

    <div class="input-zone">
        <div class="input-bar">
            <div id="file-tag"></div>
            <textarea id="userInput" placeholder="问我任何问题..." rows="1"></textarea>
            <div class="tools">
                <label class="up-btn">📎<input type="file" id="fileInput" hidden onchange="onFile(this)"></label>
                <button id="send-btn" onclick="doAction()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentId = "chat_" + Date.now();
    let messages = [];
    let controller = null;
    let selectedFile = null;

    window.onload = loadHistory;

    function toggleTheme() {
        const isDark = document.body.hasAttribute('data-theme');
        if (isDark) {
            document.body.removeAttribute('data-theme');
            document.getElementById('hl-light').disabled = false;
            document.getElementById('hl-dark').disabled = true;
        } else {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('hl-light').disabled = true;
            document.getElementById('hl-dark').disabled = false;
        }
    }

    function onFile(input) {
        if(input.files[0]) {
            selectedFile = input.files[0];
            const tag = document.getElementById('file-tag');
            tag.innerText = "📁 待上传: " + selectedFile.name;
            tag.style.display = "block";
        }
    }

    async function loadHistory() {
        try {
            const res = await fetch('/history');
            const list = await res.json();
            document.getElementById('history-list').innerHTML = list.map(item => `
                <div class="history-item" onclick="loadChat('${item.chatId}')">
                    <span>💬 ${item.title || '新对话'}</span>
                    <i class="del-icon" onclick="deleteChat(event, '${item.chatId}')">🗑️</i>
                </div>
            `).join('');
        } catch (e) {}
    }

    async function loadChat(chatId) {
        if (controller) controller.abort();
        currentId = chatId;
        const box = document.getElementById('msg-box');
        box.innerHTML = '<div style="padding:40px;text-align:center;opacity:0.5">正在提取云端完整记录...</div>';
        try {
            const res = await fetch('/history', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ chatId }) 
            });
            const data = await res.json();
            
            messages = data.messages || []; 
            box.innerHTML = '';
            
            messages.forEach(msg => {
                if(msg.role === 'assistant' && msg.reasoning_content) {
                    appendReasoning(msg.reasoning_content);
                }
                appendRow(msg.role, msg.content);
            });
            document.getElementById('scroller').scrollTop = document.getElementById('scroller').scrollHeight;
        } catch (e) { box.innerHTML = "历史载入失败"; }
    }

    async function deleteChat(event, chatId) {
        event.stopPropagation(); 
        if(!confirm("确定要永久删除这条对话吗？")) return;
        try {
            const res = await fetch('/history', {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chatId })
            });
            if(res.ok) {
                if(currentId === chatId) startNew();
                loadHistory();
            }
        } catch(e) { alert("删除失败"); }
    }

    function doAction() {
        if (document.getElementById('send-btn').innerText === '发送') send();
        else if (controller) controller.abort();
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text && !selectedFile) return;

        let displayTxt = text;
        let aiPrompt = text;

        if (selectedFile) {
            const fd = new FormData();
            fd.append('file', selectedFile);
            try {
                const res = await fetch('/upload', { method: 'POST', body: fd });
                const fData = await res.json();
                if (fData.isText) {
                    aiPrompt = `[文件内容: ${fData.name}]\n${fData.content}\n\n问题: ${text}`;
                    displayTxt = `📄 _已关联文件: ${fData.name}_\n\n${text}`;
                }
            } catch(e) { console.error("文件上传失败"); }
            selectedFile = null;
            document.getElementById('file-tag').style.display = 'none';
        }

        input.value = '';
        input.style.height = 'auto';
        document.getElementById('send-btn').innerText = '停止';

        appendRow('user', displayTxt);
        messages.push({ role: "user", content: aiPrompt });

        controller = new AbortController();
        const aiRow = createAiRow();
        const aiDiv = aiRow.querySelector('.content');
        let fullText = "", reasoningText = "", reasoningDiv = null;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, chatId: currentId }),
                signal: controller.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.substring(6));
                            const delta = data.choices[0].delta;
                            
                            if (delta.reasoning_content) {
                                if (!reasoningDiv) {
                                    reasoningDiv = document.createElement('div');
                                    reasoningDiv.className = 'reasoning';
                                    reasoningDiv.innerHTML = `<b>🤔 思考中...</b><div class="r-txt"></div>`;
                                    aiDiv.parentNode.insertBefore(reasoningDiv, aiDiv);
                                }
                                reasoningText += delta.reasoning_content;
                                reasoningDiv.querySelector('.r-txt').innerText = reasoningText;
                            }
                            
                            if (delta.content) {
                                fullText += delta.content;
                                aiDiv.innerHTML = marked.parse(fullText);
                                aiDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            }
                        } catch (e) {}
                    }
                }
                document.getElementById('scroller').scrollTop = document.getElementById('scroller').scrollHeight;
            }
            messages.push({ role: "assistant", content: fullText, reasoning_content: reasoningText });
            loadHistory();
        } catch (e) {
            if (e.name === 'AbortError') aiDiv.innerHTML += " [已停止]";
        } finally {
            document.getElementById('send-btn').innerText = '发送';
            controller = null;
        }
    }

    function appendRow(role, text) {
        const row = document.createElement('div');
        row.className = 'msg-row';
        row.innerHTML = `<div class="avatar ${role==='user'?'user-avatar':'ai-avatar'}">${role==='user'?'U':'R'}</div><div class="content">${marked.parse(text)}</div>`;
        document.getElementById('msg-box').appendChild(row);
        document.getElementById('scroller').scrollTop = document.getElementById('scroller').scrollHeight;
    }

    function createAiRow() {
        const row = document.createElement('div');
        row.className = 'msg-row';
        row.innerHTML = `<div class="avatar ai-avatar">R</div><div class="content">...</div>`;
        document.getElementById('msg-box').appendChild(row);
        return row;
    }

    function appendReasoning(text) {
        const div = document.createElement('div');
        div.className = 'msg-row';
        div.innerHTML = `<div class="reasoning"><b>🤔 历史思考:</b><div class="r-txt">${text}</div></div>`;
        document.getElementById('msg-box').appendChild(div);
    }

    function startNew() { location.reload(); }

    document.getElementById('userInput').oninput = function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    };
</script>
</body>
</html>
