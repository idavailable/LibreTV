<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hl-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" id="hl-dark" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #ffffff; --side: #f7f7f8; --text: #1a1a1a; --border: #e5e7eb; --accent: #10a37f; --msg-user: #f3f4f6; --input-bg: #ffffff; --history-hover: #ececf1; }
        [data-theme="dark"] { --bg: #212121; --side: #171717; --text: #ececec; --border: #383838; --accent: #10a37f; --msg-user: #2f2f2f; --input-bg: #2f2f2f; --history-hover: #2a2a2a; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; }
        .side-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 18px; font-weight: 800; color: var(--accent); }
        .new-btn { border: 1px solid var(--border); padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; margin-bottom: 20px; background: var(--bg); font-weight: 600; transition: 0.2s; }
        .new-btn:hover { background: var(--history-hover); }
        #history-list { flex: 1; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 5px; transition: 0.2s; }
        .history-item:hover { background: var(--history-hover); }
        .history-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .del-icon { opacity: 0; color: #ff4d4f; padding: 2px 6px; cursor: pointer; font-style: normal; }
        .history-item:hover .del-icon { opacity: 1; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #scroller { flex: 1; overflow-y: auto; padding-bottom: 180px; }
        .msg-list { max-width: 850px; margin: 0 auto; width: 92%; }
        .msg-row { padding: 25px 0; border-bottom: 1px solid var(--border); }
        .avatar { width: 34px; height: 34px; border-radius: 4px; float: left; margin-right: 18px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; }
        .ai-avatar { background: var(--accent); }
        .user-avatar { background: #5436DA; }
        .content { overflow: hidden; line-height: 1.7; font-size: 16px; word-wrap: break-word; }
        .reasoning { background: rgba(0,0,0,0.04); border-left: 4px solid var(--accent); padding: 15px; margin: 10px 0 15px 52px; border-radius: 4px; color: #666; font-size: 14px; }
        [data-theme="dark"] .reasoning { background: rgba(255,255,255,0.05); color: #aaa; }
        .input-zone { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 0; background: linear-gradient(transparent, var(--bg) 60%); }
        .input-bar { max-width: 850px; margin: 0 auto; width: 92%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; padding: 12px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; border: none; outline: none; background: transparent; color: var(--text); font-size: 16px; resize: none; max-height: 200px; padding-bottom: 35px; }
        .tools { position: absolute; bottom: 12px; right: 15px; display: flex; align-items: center; gap: 15px; }
        #send-btn { background: var(--accent); color: #fff; border: none; padding: 6px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="side-head">
        <div class="logo">LibreTV AI</div>
        <div style="cursor:pointer; font-size: 20px;" onclick="toggleTheme()">🌓</div>
    </div>
    <div class="new-btn" onclick="startNew()">+ 开启新对话</div>
    <div id="history-list"></div>
</div>
<div class="main">
    <div id="scroller"><div class="msg-list" id="msg-box"></div></div>
    <div class="input-zone">
        <div class="input-bar">
            <div id="file-tag" style="display:none; color:var(--accent); font-size:12px; margin-bottom:5px;"></div>
            <textarea id="userInput" placeholder="问我任何问题..." rows="1"></textarea>
            <div class="tools">
                <label style="cursor:pointer">📎<input type="file" id="fileInput" hidden onchange="onFile(this)"></label>
                <button id="send-btn" onclick="doAction()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentId = "chat_" + Date.now();
    let messages = [];
    let controller = null;
    let selectedFile = null;

    // --- 鉴权头获取逻辑 ---
    const getAuthHeaders = () => {
        const getCookie = (name) => {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return localStorage.getItem('auth_hash') || ""; 
        };
        return {
            'Content-Type': 'application/json',
            'X-Password': getCookie('auth_hash')
        };
    };

    const handleAuthError = (res) => {
        if (res.status === 401) { window.location.href = "/login.html"; return true; }
        return false;
    };

    // --- 主题记忆与切换 ---
    function toggleTheme() {
        const isDark = document.body.toggleAttribute('data-theme');
        const lightStyle = document.getElementById('hl-light');
        const darkStyle = document.getElementById('hl-dark');
        if (lightStyle && darkStyle) {
            lightStyle.disabled = isDark;
            darkStyle.disabled = !isDark;
        }
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    window.onload = () => {
        if (localStorage.getItem('theme') === 'dark') toggleTheme();
        loadHistory(); 
        startNew(); 
    };

    // --- 文件处理 ---
    function onFile(input) {
        if(input.files[0]) {
            selectedFile = input.files[0];
            document.getElementById('file-tag').innerText = "📁 待传: " + selectedFile.name;
            document.getElementById('file-tag').style.display = "block";
        }
    }

    // --- 历史记录 ---
    async function loadHistory() {
        const res = await fetch('/history', { headers: getAuthHeaders() });
        if (handleAuthError(res)) return;
        const list = await res.json();
        document.getElementById('history-list').innerHTML = list.map(item => `
            <div class="history-item" onclick="loadChat('${item.chatId}')">
                <span>💬 ${item.title}</span>
                <i class="del-icon" onclick="deleteChat(event, '${item.chatId}')">🗑️</i>
            </div>
        `).join('');
    }

    async function loadChat(chatId) {
        if(controller) controller.abort();
        currentId = chatId;
        const box = document.getElementById('msg-box');
        box.innerHTML = '<div style="padding:40px;text-align:center;opacity:0.5">加载中...</div>';
        const res = await fetch('/history', { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ chatId }) });
        if (handleAuthError(res)) return;
        const data = await res.json();
        messages = data.messages || [];
        box.innerHTML = '';
        messages.forEach(msg => {
            if(msg.role === 'assistant' && msg.reasoning_content) appendReasoning(msg.reasoning_content);
            appendRow(msg.role, msg.content);
        });
        scrollDown();
    }

    async function deleteChat(e, chatId) {
        e.stopPropagation();
        if(!confirm("确定要删除这段对话吗？")) return;
        const res = await fetch('/history', { method: 'DELETE', headers: getAuthHeaders(), body: JSON.stringify({ chatId }) });
        if (handleAuthError(res)) return;
        if(currentId === chatId) startNew();
        loadHistory();
    }

    // --- 核心对话逻辑 ---
    function doAction() {
        if (document.getElementById('send-btn').innerText === '发送') send();
        else if (controller) controller.abort();
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text && !selectedFile) return;

        let displayTxt = text;
        if (selectedFile) {
            const fd = new FormData();
            fd.append('file', selectedFile);
            const fRes = await fetch('/upload', { method:'POST', headers: { 'X-Password': getAuthHeaders()['X-Password'] }, body: fd });
            if (handleAuthError(fRes)) return;
            const fData = await fRes.json();
            messages.push({ role: "user", content: `[文件: ${fData.name}]\n${fData.content}\n\n问题: ${text}` });
            displayTxt = `📄 _已关联: ${fData.name}_\n\n${text}`;
            selectedFile = null;
            document.getElementById('file-tag').style.display = 'none';
        } else {
            messages.push({ role: "user", content: text });
        }

        input.value = ''; input.style.height = 'auto';
        document.getElementById('send-btn').innerText = '停止';
        appendRow('user', displayTxt);

        controller = new AbortController();
        const aiRow = createAiRow();
        const aiDiv = aiRow.querySelector('.content');
        let fullAI = "", fullReasoning = "", reasoningDiv = null;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify({ messages, chatId: currentId }),
                signal: controller.signal
            });
            if (handleAuthError(res)) return;

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                chunk.split('\n').forEach(line => {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const delta = JSON.parse(line.substring(6)).choices[0].delta;
                            if (delta.reasoning_content) {
                                if (!reasoningDiv) reasoningDiv = appendReasoning("");
                                fullReasoning += delta.reasoning_content;
                                reasoningDiv.querySelector('div').innerText = fullReasoning;
                            }
                            if (delta.content) {
                                fullAI += delta.content;
                                aiDiv.innerHTML = marked.parse(fullAI);
                                aiDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            }
                        } catch(e) {}
                    }
                });
                scrollDown();
            }
            messages.push({ role: "assistant", content: fullAI, reasoning_content: fullReasoning });
            
            // 【优化点】延迟刷新列表：等待 R2 写入索引生效 (1秒)
            setTimeout(() => { loadHistory(); }, 1000);

        } catch (e) { if(e.name==='AbortError') aiDiv.innerHTML += " [已停止]"; }
        finally { document.getElementById('send-btn').innerText = '发送'; controller = null; }
    }

    // --- UI 渲染辅助 ---
    function appendRow(role, text) {
        const row = document.createElement('div');
        row.className = 'msg-row';
        row.innerHTML = `<div class="avatar ${role==='user'?'user-avatar':'ai-avatar'}">${role==='user'?'U':'R'}</div><div class="content">${marked.parse(text)}</div>`;
        document.getElementById('msg-box').appendChild(row);
        return row;
    }
    function createAiRow() {
        const row = document.createElement('div');
        row.className = 'msg-row';
        row.innerHTML = `<div class="avatar ai-avatar">R</div><div class="content">...</div>`;
        document.getElementById('msg-box').appendChild(row);
        return row;
    }
    function appendReasoning(text) {
        const div = document.createElement('div');
        div.className = 'reasoning';
        div.innerHTML = `<b>🤔 思考过程:</b><div>${text}</div>`;
        document.getElementById('msg-box').appendChild(div);
        return div;
    }
    function startNew() {
        currentId = "chat_" + Date.now();
        messages = [];
        document.getElementById('msg-box').innerHTML = '<div class="msg-row"><div class="avatar ai-avatar">R</div><div class="content">你好，我是 LibreTV AI，今天想聊点什么？</div></div>';
    }
    function scrollDown() { document.getElementById('scroller').scrollTop = document.getElementById('scroller').scrollHeight; }
    document.getElementById('userInput').oninput = function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; };
</script>
</body>
</html>
