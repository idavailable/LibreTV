<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f9f9f9;
            --text-main: #1a1a1a;
            --border-color: #e5e5e5;
            --chat-max-width: 800px;
            --user-msg-bg: #f4f4f4;
        }

        /* 暗黑模式变量 */
        [data-theme="dark"] {
            --bg-main: #212121;
            --bg-sidebar: #171717;
            --text-main: #ececec;
            --border-color: #303030;
            --user-msg-bg: #2f2f2f;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            transition: background 0.3s;
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 10px;
        }

        .new-chat-btn {
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            background: transparent;
            color: var(--text-main);
        }

        /* 主聊天区 */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #chat-window {
            flex: 1;
            width: 100%;
            max-width: var(--chat-max-width);
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* 消息渲染：取消背景色，改用类 ChatGPT 布局 */
        .message-row {
            padding: 24px 0;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user-avatar { background: #5436DA; color: white; }
        .ai-avatar { background: #10a37f; color: white; }

        .content {
            flex: 1;
            line-height: 1.7;
            font-size: 16px;
            overflow-x: auto;
        }

        /* 输入区：悬浮胶囊设计 */
        .input-area {
            width: 100%;
            max-width: var(--chat-max-width);
            padding: 20px;
            box-sizing: border-box;
        }

        .input-wrapper {
            position: relative;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 10px 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }

        textarea {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-main);
            font-size: 16px;
            resize: none;
            max-height: 200px;
        }

        .bottom-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        #theme-toggle { cursor: pointer; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body data-theme="dark"> <div class="sidebar">
    <button class="new-chat-btn" onclick="location.reload()">+ 新对话</button>
    <div style="flex:1"></div>
    <div id="theme-toggle" onclick="toggleTheme()">🌓 切换模式</div>
</div>

<div class="main-container">
    <div id="chat-window">
        <div class="message-row">
            <div class="avatar ai-avatar">D</div>
            <div class="content">你好，我是你的专属 DeepSeek 助手。有什么可以帮你的？</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="给 DeepSeek 发送消息..." rows="1"></textarea>
            <div class="bottom-controls">
                <span style="font-size:12px; opacity:0.4">Enter 发送 / Shift+Enter 换行</span>
                <button id="send-btn" style="background:#10a37f; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('send-btn');
    let messages = [];

    // 主题切换
    function toggleTheme() {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    // 自动高度
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = '';
        userInput.style.height = 'auto';
        
        appendRow('user', text);
        messages.push({ role: "user", content: text });

        const aiContentDiv = appendRow('assistant', '思考中...');
        let fullText = "";

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: messages })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiContentDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        const data = JSON.parse(line.substring(6));
                        const content = data.choices[0].delta.content || "";
                        fullText += content;
                        aiContentDiv.innerHTML = marked.parse(fullText);
                        aiContentDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText });
        } catch (e) {
            aiContentDiv.innerText = "出错了: " + e.message;
        }
    }

    function appendRow(role, text) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `
            <div class="avatar ${role === 'user' ? 'user-avatar' : 'ai-avatar'}">${role === 'user' ? 'U' : 'D'}</div>
            <div class="content">${role === 'user' ? text : marked.parse(text)}</div>
        `;
        chatWindow.appendChild(row);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return row.querySelector('.content');
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeydown = e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
</script>
</body>
</html>
