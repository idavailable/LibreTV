<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV AI - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg-main: #ffffff; --bg-sidebar: #f9f9f9; --text-main: #1a1a1a; --border-color: #e5e5e5; --accent: #10a37f; --max-w: 1200px; }
        [data-theme="dark"] { --bg-main: #212121; --bg-sidebar: #171717; --text-main: #ececec; --border-color: #383838; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 侧边栏 */
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; }
        .new-chat-btn { border: 1px solid var(--accent); padding: 10px; border-radius: 8px; cursor: pointer; background: rgba(16, 163, 127, 0.1); color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 20px; }
        #history-container { flex: 1; overflow-y: auto; font-size: 13px; }
        .history-item { padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: rgba(0,0,0,0.05); }

        /* 主容器 */
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #chat-window { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0; }
        .chat-content-area { width: 100%; max-width: var(--max-w); padding: 0 20px; box-sizing: border-box; }
        
        /* 消息行 - 修复竖向显示关键 */
        .message-row { padding: 30px 0; border-bottom: 1px solid var(--border-color); display: flex; align-items: flex-start; gap: 20px; width: 100%; }
        .avatar { width: 32px; height: 32px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; margin-top: 4px; }
        .ai-avatar { background: var(--accent); }
        .user-avatar { background: #5436DA; }
        
        /* 内容区域修复 */
        .content { flex: 1; min-width: 0; line-height: 1.6; font-size: 16px; word-break: break-word; }
        .content p { margin: 0 0 1em 0; }
        .content pre { background: #1a1b26; padding: 15px; border-radius: 8px; overflow-x: auto; width: 100%; box-sizing: border-box; }

        .reasoning-box { background: rgba(128,128,128,0.07); border-left: 3px solid var(--accent); padding: 15px; margin-bottom: 15px; border-radius: 4px; color: #888; font-size: 14px; }

        /* 输入框区域 */
        .input-area { width: 100%; display: flex; justify-content: center; padding: 20px 0 40px; background: linear-gradient(transparent, var(--bg-main) 20%); }
        .input-wrapper { width: 90%; max-width: var(--max-w); background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        textarea { width: 100%; border: none; outline: none; background: transparent; color: var(--text-main); font-size: 16px; resize: none; max-height: 200px; padding: 5px 0; }
        
        .toolbar { display: flex; align-items: center; margin-top: 8px; gap: 12px; }
        .tool-btn { cursor: pointer; opacity: 0.6; display: flex; align-items: center; }
        .tool-btn:hover { opacity: 1; color: var(--accent); }
        
        #action-btn { margin-left: auto; background: var(--accent); color: white; border: none; padding: 7px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        #action-btn.stop { background: #dc2626; }
    </style>
</head>
<body data-theme="dark">

<div class="sidebar">
    <div class="new-chat-btn" onclick="location.reload()">+ 开启新对话</div>
    <div id="history-container"></div>
    <div style="margin-top:auto; padding-top:10px; cursor:pointer; opacity:0.5" onclick="toggleTheme()">🌓 切换模式</div>
</div>

<div class="main-container">
    <div id="chat-window">
        <div class="chat-content-area" id="msg-container">
            <div class="message-row">
                <div class="avatar ai-avatar">R</div>
                <div class="content">您好！已为您修复显示布局，现在支持宽屏阅读、停止生成及文件上传。</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <div id="file-info" style="display:none; font-size:12px; color:var(--accent); margin-bottom:5px"></div>
            <textarea id="userInput" placeholder="输入您的问题..." rows="1"></textarea>
            <div class="toolbar">
                <label class="tool-btn" title="上传附件">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    <input type="file" id="fileInput" hidden onchange="document.getElementById('file-info').innerText='已选文件: '+this.files[0].name; document.getElementById('file-info').style.display='block'">
                </label>
                <button id="action-btn" onclick="handleAction()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    let messages = [];
    let controller = null;
    let currentChatId = "chat_" + Date.now();
    const msgContainer = document.getElementById('msg-container');
    const userInput = document.getElementById('userInput');
    const actionBtn = document.getElementById('action-btn');

    function toggleTheme() {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    }

    function handleAction() {
        if (actionBtn.innerText === '发送') sendMessage();
        else stopGeneration();
    }

    function stopGeneration() {
        if (controller) {
            controller.abort();
            actionBtn.innerText = '发送';
            actionBtn.classList.remove('stop');
        }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = '';
        userInput.style.height = 'auto';
        actionBtn.innerText = '停止';
        actionBtn.classList.add('stop');

        appendRow('user', text);
        messages.push({ role: "user", content: text });

        controller = new AbortController();
        const aiRow = document.createElement('div');
        aiRow.className = 'message-row';
        aiRow.innerHTML = `<div class="avatar ai-avatar">R</div><div class="content" id="active-content">...</div>`;
        msgContainer.appendChild(aiRow);
        
        const aiDiv = aiRow.querySelector('#active-content');
        let fullText = "", reasoningText = "", reasoningDiv = null;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, chatId: currentChatId }),
                signal: controller.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.substring(6));
                            const delta = data.choices[0].delta;

                            if (delta.reasoning_content) {
                                if (!reasoningDiv) {
                                    reasoningDiv = document.createElement('div');
                                    reasoningDiv.className = 'reasoning-box';
                                    reasoningDiv.innerHTML = `<div style="font-weight:bold;font-size:12px;margin-bottom:8px">🤔 思考过程</div><div class="r-text"></div>`;
                                    aiDiv.parentNode.insertBefore(reasoningDiv, aiDiv);
                                }
                                reasoningText += delta.reasoning_content;
                                reasoningDiv.querySelector('.r-text').innerText = reasoningText;
                            }

                            if (delta.content) {
                                fullText += delta.content;
                                aiDiv.innerHTML = marked.parse(fullText);
                                aiDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            }
                            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText, reasoning_content: reasoningText });
        } catch (e) {
            if (e.name === 'AbortError') aiDiv.innerHTML += " [已停止]";
            else aiDiv.innerText = "Error: " + e.message;
        } finally {
            actionBtn.innerText = '发送';
            actionBtn.classList.remove('stop');
            controller = null;
        }
    }

    function appendRow(role, text) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `<div class="avatar ${role==='user'?'user-avatar':'ai-avatar'}">${role==='user'?'U':'R'}</div><div class="content">${marked.parse(text)}</div>`;
        msgContainer.appendChild(row);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
    userInput.onkeydown = e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
</script>
</body>
</html>
