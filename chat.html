<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        /* 1. 基础样式 */
        :root { --bg: #212121; --side: #171717; --text: #ececec; --border: #383838; --accent: #10a37f; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        /* 2. 侧边栏恢复 */
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 15px; flex-shrink: 0; }
        .logo { font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .new-chat-btn { border: 1px solid var(--accent); padding: 12px; border-radius: 8px; cursor: pointer; background: rgba(16, 163, 127, 0.1); color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 20px; transition: 0.3s; }
        .new-chat-btn:hover { background: rgba(16, 163, 127, 0.2); }
        #history-container { flex: 1; overflow-y: auto; }
        .history-item { padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .history-item:hover { background: #2a2a2a; color: #fff; }

        /* 3. 主界面布局 - 彻底放弃 Flex 居中以解决竖排问题 */
        .main-container { flex: 1; position: relative; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
        
        /* 聊天窗口：直接块级滚动 */
        #chat-window { flex: 1; overflow-y: auto; width: 100%; display: block; padding-bottom: 100px; }
        
        /* 消息行：强制宽度 100% */
        .message-row { width: 100%; border-bottom: 1px solid var(--border); padding: 30px 0; }
        .message-inner { max-width: 850px; margin: 0 auto; width: 92%; display: flex; align-items: flex-start; gap: 20px; }
        
        .avatar { width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .ai-avatar { background: var(--accent); }
        .user-avatar { background: #5436DA; }

        /* 4. 内容区核心修复：严禁宽度塌陷 */
        .content { 
            flex: 1; 
            min-width: 0; /* 允许在 Flex 容器内正确撑开 */
            display: block; 
            width: 100%; 
            font-size: 16px; 
            line-height: 1.7; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }
        /* 强制 Markdown 内部元素横向铺满 */
        .content p, .content ul, .content ol, .content li { width: 100%; display: block; margin: 0 0 1em 0; }
        .content pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; width: 100%; margin: 15px 0; border: 1px solid var(--border); }
        
        /* 推理框样式 */
        .reasoning-box { background: rgba(255,255,255,0.05); border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 15px; border-radius: 6px; color: #999; font-size: 14px; width: 100%; }

        /* 5. 输入区样式 */
        .input-area { width: 100%; padding: 20px 0 40px; background: linear-gradient(transparent, var(--bg) 50%); position: absolute; bottom: 0; }
        .input-wrapper { max-width: 850px; margin: 0 auto; width: 92%; background: #2f2f2f; border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        textarea { width: 100%; border: none; outline: none; background: transparent; color: white; font-size: 16px; resize: none; max-height: 200px; padding-bottom: 30px; line-height: 1.5; }
        
        .toolbar { position: absolute; bottom: 12px; right: 16px; display: flex; gap: 15px; align-items: center; }
        #action-btn { background: var(--accent); color: white; border: none; padding: 6px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #action-btn.stop { background: #ef4444; }
        .file-btn { cursor: pointer; opacity: 0.7; font-size: 18px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo"><span>LibreTV</span> <span style="color:#fff">AI</span></div>
    <div class="new-chat-btn" onclick="startNewChat()">+ 开启新对话</div>
    <div id="history-container"></div>
</div>

<div class="main-container">
    <div id="chat-window">
        <div id="msg-container">
            <div class="message-row">
                <div class="message-inner">
                    <div class="avatar ai-avatar">R</div>
                    <div class="content">你好！架构已重写，文字现在应该正常横向显示了。</div>
                </div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="输入消息..." rows="1"></textarea>
            <div class="toolbar">
                <label class="file-btn">📎<input type="file" id="fileInput" hidden onchange="handleFile(this)"></label>
                <button id="action-btn" onclick="handleAction()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 变量初始化
    let currentChatId = "chat_" + Date.now();
    let messages = [];
    let controller = null;

    window.onload = loadHistory;

    function handleAction() {
        if (document.getElementById('action-btn').innerText === '发送') sendMessage();
        else if (controller) controller.abort();
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';
        const btn = document.getElementById('action-btn');
        btn.innerText = '停止';
        btn.classList.add('stop');

        appendRow('user', text);
        messages.push({ role: "user", content: text });

        controller = new AbortController();
        const aiRow = createAiRow();
        const aiDiv = aiRow.querySelector('.active-text');
        let fullText = "", reasoningText = "", reasoningDiv = null;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, chatId: currentChatId }),
                signal: controller.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.substring(6));
                            const delta = data.choices[0].delta;

                            if (delta.reasoning_content) {
                                if (!reasoningDiv) {
                                    reasoningDiv = document.createElement('div');
                                    reasoningDiv.className = 'reasoning-box';
                                    reasoningDiv.innerHTML = `<b>🤔 思考中...</b><div class="r-text"></div>`;
                                    aiDiv.parentNode.insertBefore(reasoningDiv, aiDiv);
                                }
                                reasoningText += delta.reasoning_content;
                                reasoningDiv.querySelector('.r-text').innerText = reasoningText;
                            }

                            if (delta.content) {
                                fullText += delta.content;
                                aiDiv.innerHTML = marked.parse(fullText);
                                aiDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            }
                            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText, reasoning_content: reasoningText });
            loadHistory();
        } catch (e) {
            if (e.name === 'AbortError') aiDiv.innerHTML += " [已停止]";
            else aiDiv.innerText = "错误: " + e.message;
        } finally {
            btn.innerText = '发送';
            btn.classList.remove('stop');
            controller = null;
        }
    }

    function createAiRow() {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `
            <div class="message-inner">
                <div class="avatar ai-avatar">R</div>
                <div class="content active-text">...</div>
            </div>`;
        document.getElementById('msg-container').appendChild(row);
        return row;
    }

    function appendRow(role, text) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `
            <div class="message-inner">
                <div class="avatar ${role==='user'?'user-avatar':'ai-avatar'}">${role==='user'?'U':'R'}</div>
                <div class="content">${marked.parse(text)}</div>
            </div>`;
        document.getElementById('msg-container').appendChild(row);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    async function loadHistory() {
        try {
            const res = await fetch('/history');
            const list = await res.json();
            document.getElementById('history-container').innerHTML = list.map(item => `
                <div class="history-item" onclick="loadChat('${item.chatId}')">💬 ${item.title || '新对话'}</div>
            `).join('');
        } catch (e) {}
    }

    function startNewChat() { location.reload(); }

    document.getElementById('userInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });
</script>
</body>
</html>
