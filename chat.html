<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV AI - Fixed Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #212121; --side: #171717; --text: #ececec; --border: #383838; --accent: #10a37f; }
        
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* 侧边栏 */
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; }
        .new-chat-btn { border: 1px solid var(--accent); padding: 10px; border-radius: 8px; cursor: pointer; background: rgba(16, 163, 127, 0.1); color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 20px; }
        #history-container { flex: 1; overflow-y: auto; }
        .history-item { padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .history-item:hover { background: #2a2a2a; border-color: var(--border); }

        /* 主内容区 */
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; background: var(--bg); }
        
        /* 聊天窗口：确保它能横向撑开 */
        #chat-window { flex: 1; overflow-y: auto; width: 100%; display: block; padding-bottom: 50px; }
        .chat-content-area { width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        /* 消息行：强制宽度 100%，防止文字竖排 */
        .message-row { padding: 30px 0; border-bottom: 1px solid var(--border); display: flex; width: 100%; align-items: flex-start; gap: 20px; }
        .avatar { width: 32px; height: 32px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .ai-avatar { background: var(--accent); }
        .user-avatar { background: #5436DA; }
        
        /* 内容：这是修复的关键，强制 flex-grow 且不限制宽度 */
        .content { flex: 1; min-width: 0; line-height: 1.6; font-size: 16px; word-break: break-all; overflow-wrap: break-word; }
        .content p { margin: 0 0 1em 0; width: 100%; }
        .content pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; width: 100%; margin: 10px 0; border: 1px solid var(--border); }
        
        .reasoning-box { background: rgba(255,255,255,0.03); border-left: 3px solid var(--accent); padding: 15px; margin: 15px 0; border-radius: 4px; color: #aaa; font-size: 14px; width: 100%; }

        /* 输入框 */
        .input-area { width: 100%; padding: 20px 0; background: var(--bg); border-top: 1px solid var(--border); }
        .input-wrapper { width: 90%; max-width: 1000px; margin: 0 auto; background: #2f2f2f; border: 1px solid var(--border); border-radius: 12px; padding: 10px 15px; position: relative; }
        textarea { width: 100%; border: none; outline: none; background: transparent; color: white; font-size: 16px; resize: none; max-height: 200px; padding-bottom: 30px; }
        
        .toolbar { display: flex; align-items: center; gap: 15px; position: absolute; bottom: 10px; right: 15px; }
        #action-btn { background: var(--accent); color: white; border: none; padding: 5px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        #action-btn.stop { background: #dc2626; }
        
        .file-btn { cursor: pointer; opacity: 0.6; }
        #file-tag { display: none; font-size: 11px; color: var(--accent); padding: 2px 8px; background: rgba(16, 163, 127, 0.1); border-radius: 4px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="new-chat-btn" onclick="startNewChat()">+ 开启新对话</div>
    <div id="history-container"></div>
</div>

<div class="main-container">
    <div id="chat-window">
        <div class="chat-content-area" id="msg-container">
            <div class="message-row">
                <div class="avatar ai-avatar">R</div>
                <div class="content">布局已重构。请测试文字显示是否恢复正常横向排列。</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <div id="file-tag"></div>
            <textarea id="userInput" placeholder="输入消息..." rows="1"></textarea>
            <div class="toolbar">
                <label class="file-btn">
                    📎 <input type="file" id="fileInput" hidden onchange="handleFile(this)">
                </label>
                <button id="action-btn" onclick="handleAction()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 脚本最顶部初始化，防止 undefined 错误
    let currentChatId = "chat_" + Date.now();
    let messages = [];
    let controller = null;
    let selectedFile = null;

    const msgContainer = document.getElementById('msg-container');
    const userInput = document.getElementById('userInput');
    const actionBtn = document.getElementById('action-btn');
    const fileTag = document.getElementById('file-tag');

    // 页面加载拉取历史
    window.onload = loadHistory;

    function handleAction() {
        if (actionBtn.innerText === '发送') sendMessage();
        else if (controller) controller.abort();
    }

    function handleFile(input) {
        if (input.files[0]) {
            selectedFile = input.files[0];
            fileTag.innerText = "已选: " + selectedFile.name;
            fileTag.style.display = "inline-block";
        }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text && !selectedFile) return;

        let displayContent = text;
        let aiPrompt = text;

        if (selectedFile) {
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('chatId', currentChatId);
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const fData = await res.json();
                if (fData.isText) {
                    aiPrompt = `[文件内容:${fData.name}]\n${fData.content}\n\n问题:${text}`;
                    displayContent += `\n\n📄 _已读附件: ${fData.name}_`;
                }
            } catch(e) { console.error(e); }
            selectedFile = null;
            fileTag.style.display = "none";
        }

        userInput.value = '';
        userInput.style.height = 'auto';
        actionBtn.innerText = '停止';
        actionBtn.classList.add('stop');

        appendRow('user', displayContent);
        messages.push({ role: "user", content: aiPrompt });

        controller = new AbortController();
        const aiRow = document.createElement('div');
        aiRow.className = 'message-row';
        aiRow.innerHTML = `<div class="avatar ai-avatar">R</div><div class="content" id="active-content">...</div>`;
        msgContainer.appendChild(aiRow);
        
        const aiDiv = aiRow.querySelector('#active-content');
        let fullText = "", reasoningText = "", reasoningDiv = null;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, chatId: currentChatId }),
                signal: controller.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.substring(6));
                            const delta = data.choices[0].delta;

                            if (delta.reasoning_content) {
                                if (!reasoningDiv) {
                                    reasoningDiv = document.createElement('div');
                                    reasoningDiv.className = 'reasoning-box';
                                    reasoningDiv.innerHTML = `<strong>🤔 思考:</strong><div class="r-text"></div>`;
                                    aiDiv.parentNode.insertBefore(reasoningDiv, aiDiv);
                                }
                                reasoningText += delta.reasoning_content;
                                reasoningDiv.querySelector('.r-text').innerText = reasoningText;
                            }

                            if (delta.content) {
                                fullText += delta.content;
                                aiDiv.innerHTML = marked.parse(fullText);
                                aiDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            }
                            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText, reasoning_content: reasoningText });
            loadHistory();
        } catch (e) {
            if (e.name === 'AbortError') aiDiv.innerHTML += " [已停止]";
            else aiDiv.innerText = "错误: " + e.message;
        } finally {
            actionBtn.innerText = '发送';
            actionBtn.classList.remove('stop');
            controller = null;
        }
    }

    function appendRow(role, text) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `<div class="avatar ${role==='user'?'user-avatar':'ai-avatar'}">${role==='user'?'U':'R'}</div><div class="content">${marked.parse(text)}</div>`;
        msgContainer.appendChild(row);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    async function loadHistory() {
        try {
            const res = await fetch('/history');
            const list = await res.json();
            document.getElementById('history-container').innerHTML = list.map(item => `
                <div class="history-item" onclick="loadChat('${item.chatId}')">
                    💬 ${item.title}
                </div>
            `).join('');
        } catch (e) {}
    }

    async function loadChat(chatId) {
        currentChatId = chatId;
        msgContainer.innerHTML = '<div style="padding:20px;opacity:0.5">加载中...</div>';
        const res = await fetch('/history', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ chatId }) });
        const data = await res.json();
        messages = data.messages;
        msgContainer.innerHTML = '';
        messages.forEach(msg => {
            if (msg.role === 'assistant' && msg.reasoning_content) {
                const rBox = document.createElement('div');
                rBox.className = 'reasoning-box';
                rBox.innerHTML = `<strong>🤔 思考:</strong><div>${msg.reasoning_content}</div>`;
                msgContainer.appendChild(rBox);
            }
            appendRow(msg.role, msg.content);
        });
    }

    function startNewChat() {
        messages = [];
        currentChatId = "chat_" + Date.now();
        msgContainer.innerHTML = '';
        appendRow('ai', '新对话已开启。');
    }

    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    userInput.onkeydown = e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
</script>
</body>
</html>
